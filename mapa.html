<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Interactivo — Santa Martha Acatitla</title>
    <style>
        @font-face {
            font-family: 'ApercuMono';
            src: url('ApercuMonoProRegular.ttf') format('truetype');
            font-weight: 400;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #000;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #video-mapa {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: 1;
        }

        /* BANNER */
        #banner {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            background: #000000;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 40px;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        #banner-instruccion {
            font-family: 'ApercuMono', monospace;
            font-size: 11px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #fff200;
        }

        #banner-links {
            display: flex;
            gap: 32px;
            align-items: center;
            flex-shrink: 0;
            margin-left: 40px;
        }

        #banner-links a {
            font-family: 'ApercuMono', monospace;
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #fff200;
            text-decoration: none;
            border-bottom: 1px solid #fff200;
            padding-bottom: 2px;
            transition: opacity 0.2s;
        }

        #banner-links a:hover { opacity: 0.6; }

        /* BOTONES INVISIBLES */
        .punto-btn {
            position: fixed;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: transparent;
            border: none;
            cursor: pointer;
            z-index: 10;
            transform: translate(-50%, -50%);
        }

        #btn-1 { left: 42%; top: 27%; }
        #btn-2 { left: 45%; top: 36%; }
        #btn-3 { left: 48.5%; top: 47%; }
        #btn-4 { left: 55.5%; top: 48%; }
        #btn-5 { left: 67.5%; top: 55%; }

        /* LIGHTBOX */
        #lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            z-index: 100;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        #lightbox.activo { display: flex; }

        #video-punto {
            max-width: 90vw;
            max-height: 85vh;
            display: block;
        }

        #btn-cerrar {
            position: fixed;
            top: 32px;
            right: 40px;
            font-family: 'ApercuMono', monospace;
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #fff200;
            background: none;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- BANNER -->
    <div id="banner">
        <p id="banner-instruccion">Selecciona los distintos puntos del mapa para explorar las evidencias de erosión hídrica en Santa Martha Acatitla, Iztapalapa</p>
        <div id="banner-links">
            <a href="index.html">Inicio</a>
            <a href="investigacion.html">Investigación</a>
        </div>
    </div>

    <!-- VIDEO PRINCIPAL -->
    <video id="video-mapa" autoplay loop muted playsinline>
        <source src="https://res.cloudinary.com/dpfqraeom/video/upload/v1780025423/Santa_martha_inicio_hxtwho.mp4" type="video/mp4">
    </video>

    <!-- BOTONES INVISIBLES -->
    <button class="punto-btn" id="btn-1" onclick="abrirPunto('https://res.cloudinary.com/dpfqraeom/video/upload/v1780004184/Punto1_om5syc.mp4')"></button>
    <button class="punto-btn" id="btn-2" onclick="abrirPunto('https://res.cloudinary.com/dpfqraeom/video/upload/v1780022219/Punto2_zuxror.mp4')"></button>
    <button class="punto-btn" id="btn-3" onclick="abrirPunto('https://res.cloudinary.com/dpfqraeom/video/upload/v1780024465/Punto_3_pdvusw.mp4')"></button>
    <button class="punto-btn" id="btn-4" onclick="abrirPunto('https://res.cloudinary.com/dpfqraeom/video/upload/v1780024467/Punto_4_jgxpmx.mp4')"></button>
    <button class="punto-btn" id="btn-5" onclick="abrirPunto('https://res.cloudinary.com/dpfqraeom/video/upload/v1780024474/Punto_5_yseyfl.mp4')"></button>

    <!-- LIGHTBOX -->
    <div id="lightbox">
        <button id="btn-cerrar" onclick="cerrarPunto()">✕ cerrar</button>
        <video id="video-punto" controls autoplay playsinline>
            <source src="" type="video/mp4">
        </video>
    </div>

<script>
    function abrirPunto(src) {
        const video = document.getElementById('video-punto');
        video.querySelector('source').src = src;
        video.load();
        video.play();
        document.getElementById('lightbox').classList.add('activo');
        document.getElementById('video-mapa').pause();
        document.getElementById('banner').classList.add('oculto');
    }

    function cerrarPunto() {
        const video = document.getElementById('video-punto');
        video.pause();
        video.querySelector('source').src = '';
        document.getElementById('lightbox').classList.remove('activo');
        document.getElementById('video-mapa').play();
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') cerrarPunto();
    });
</script>

</body>
</html>
