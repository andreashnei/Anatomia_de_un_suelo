<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anatomía de un Suelo Fracturado</title>
    <style>
        @font-face {
            font-family: 'ApercuMono';
            src: url('ApercuMonoProRegular.ttf') format('truetype');
            font-weight: 400;
        }
        @font-face {
            font-family: 'ApercuMono';
            src: url('ApercuMonoProBold.ttf') format('truetype');
            font-weight: 700;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #fff200;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #logo-wrapper {
            position: relative;
            cursor: pointer;
            user-select: none;
            width: min(1400px, 95vw);
        }

        #logo-img {
            width: 100%;
            height: auto;
            display: block;
            transition: opacity 0.5s ease;
        }

        .punto-logo {
            position: absolute;
            width: 25px;
            height: 25px;
            background: #231f20;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .punto-flotante {
            position: fixed;
            width: 25px;
            height: 25px;
            background: #231f20;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            cursor: pointer;
            z-index: 100;
            transition: transform 0.15s ease;
        }
        .punto-flotante:hover {
            transform: translate(-50%, -50%) scale(1.5);
        }

        .etiqueta {
            position: fixed;
            font-family: 'ApercuMono', monospace;
            font-weight: 350;
            font-size: 25px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #231f20;
            opacity: 0;
            pointer-events: none;
            white-space: nowrap;
            z-index: 100;
            line-height: 1.5;
            transition: opacity 0.5s ease;
        }
        .etiqueta.activa {
            pointer-events: auto;
            cursor: pointer;
        }

        #subtitulo-inicio {
            position: fixed;
            bottom: 140px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'ApercuMono', monospace;
            font-size: 19.8px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #231f20;
            white-space: nowrap;
            padding: 10px 20px;
            transition: opacity 0.5s ease;
            z-index: 50;
        }

        #subtitulo-inicio.oculto {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="logo-wrapper">
        <img id="logo-img" src="img/logo_tipografia.svg" alt="Logo Anatomía de un Suelo Fracturado">
        <div class="punto-logo" id="pl1" style="left:48.02%; top:42.11%"></div>
        <div class="punto-logo" id="pl2" style="left:41.78%; top:43.01%"></div>
        <div class="punto-logo" id="pl3" style="left:44.18%; top:46.72%"></div>
        <div class="punto-logo" id="pl4" style="left:41.08%; top:52.43%"></div>
        <div class="punto-logo" id="pl5" style="left:47.05%; top:52.83%"></div>
    </div>

    <div id="subtitulo-inicio">LA EROSIÓN HÍDRICA Y SUS EFECTOS EN LA VÍA PÚBLICA</div>

    <div class="etiqueta" id="etq-1">ANATOMÍA DE UN<br>SUELO FRACTURADO</div>
    <div class="etiqueta" id="etq-2">HOME</div>
    <div class="etiqueta" id="etq-3">MAPA INTERACTIVO //<br>SANTA MARTHA ACATITLA</div>
    <div class="etiqueta" id="etq-4">FROTTAGES<br>//ARCHIVO ANÁLOGO</div>

<script>
    let yaExploto = false;

    document.getElementById('logo-wrapper').addEventListener('click', explotar);

    const destinos = [
        { pl: 'pl1', x: 57, y: 21, etq: 'etq-1', href: 'investigacion.html', dir: 'derecha'   },
        { pl: 'pl2', x: 33, y: 35, etq: 'etq-2', href: 'index.html',         dir: 'izquierda' },
        { pl: 'pl3', x: 45, y: 50, etq: null,    href: null                                    },
        { pl: 'pl4', x: 37, y: 65, etq: 'etq-3', href: 'mapa.html',          dir: 'abajoizq'  },
        { pl: 'pl5', x: 63, y: 57, etq: 'etq-4', href: 'frottages.html',     dir: 'derecha'   },
    ];

    function explotar() {
        if (yaExploto) return;
        yaExploto = true;

        document.getElementById('logo-img').style.opacity = '0';

        // Ocultar subtítulo al explotar
        document.getElementById('subtitulo-inicio').classList.add('oculto');

        const vw = window.innerWidth;
        const vh = window.innerHeight;

        destinos.forEach((d, i) => {
            const puntoLogo = document.getElementById(d.pl);
            const rect = puntoLogo.getBoundingClientRect();
            const startX = rect.left + rect.width  / 2;
            const startY = rect.top  + rect.height / 2;

            puntoLogo.style.opacity = '0';

            const punto = document.createElement('div');
            punto.className = 'punto-flotante';
            punto.style.left    = startX + 'px';
            punto.style.top     = startY + 'px';
            punto.style.opacity = '1';
            if (d.href) punto.onclick = () => window.location.href = d.href;
            document.body.appendChild(punto);

            const xFinal = (d.x / 100) * vw;
            const yFinal = (d.y / 100) * vh;

            requestAnimationFrame(() => {
                setTimeout(() => {
                    punto.style.transition = `left 1s cubic-bezier(0.22,1,0.36,1), top 1s cubic-bezier(0.22,1,0.36,1)`;
                    punto.style.left = xFinal + 'px';
                    punto.style.top  = yFinal + 'px';

                    if (d.etq) {
                        setTimeout(() => {
                            const etq = document.getElementById(d.etq);
                            if (d.dir === 'derecha') {
                                etq.style.left  = (xFinal + 22) + 'px';
                                etq.style.right = 'auto';
                                etq.style.top   = (yFinal - 8) + 'px';
                            } else if (d.dir === 'izquierda') {
                                etq.style.right = (vw - xFinal + 22) + 'px';
                                etq.style.left  = 'auto';
                                etq.style.top   = (yFinal - 8) + 'px';
                            } else if (d.dir === 'abajoizq') {
                                etq.style.right = (vw - xFinal + 22) + 'px';
                                etq.style.left  = 'auto';
                                etq.style.top   = (yFinal + 18) + 'px';
                            }
                            etq.style.opacity = '1';
                            if (d.href) {
                                etq.classList.add('activa');
                                etq.onclick = () => window.location.href = d.href;
                            }
                        }, 900);
                    }
                }, i * 100);
            });
        });
    }
</script>

</body>
</html>
