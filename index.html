<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anatomía de un Suelo Fracturado</title>
    <style>
        @font-face {
            font-family: 'ApercuMono';
            src: url('ApercuMonoProRegular.ttf') format('truetype');
            font-weight: 400;
        }
        @font-face {
            font-family: 'ApercuMono';
            src: url('ApercuMonoProMedium.ttf') format('truetype');
            font-weight: 500;
        }
        @font-face {
            font-family: 'ApercuMono';
            src: url('ApercuMonoProBold.ttf') format('truetype');
            font-weight: 700;
        }
        @font-face {
            font-family: 'ApercuMono';
            src: url('ApercuMonoProLight.ttf') format('truetype');
            font-weight: 300;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #FFE500;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        #inicio {
            position: fixed;
            inset: 0;
            background: #FFE500;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #logo-wrapper {
            cursor: pointer;
            user-select: none;
            width: min(680px, 80vw);
        }

        #logo-wrapper svg {
            width: 100%;
            height: auto;
            display: block;
        }

        #logo-texto-group {
            transition: opacity 0.5s ease;
        }

        #instruccion {
            text-align: center;
            margin-top: 1.4rem;
            font-family: 'ApercuMono', monospace;
            font-weight: 400;
            font-size: 11px;
            letter-spacing: 0.3em;
            color: #333;
            text-transform: uppercase;
            transition: opacity 0.3s ease;
        }

        .punto-flotante {
            position: fixed;
            width: 16px;
            height: 16px;
            background: #111;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            cursor: pointer;
            z-index: 100;
            transition: transform 0.15s ease;
        }
        .punto-flotante:hover {
            transform: translate(-50%, -50%) scale(1.5);
        }

        .etiqueta-flotante {
            position: fixed;
            font-family: 'ApercuMono', monospace;
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #111;
            opacity: 0;
            pointer-events: none;
            white-space: nowrap;
            z-index: 100;
            line-height: 1.6;
        }
        .etiqueta-flotante.activa {
            pointer-events: auto;
            cursor: pointer;
        }
        .etiqueta-flotante.activa:hover {
            text-decoration: underline;
        }

        #punto-origen {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #111;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            z-index: 100;
            pointer-events: none;
        }
    </style>
</head>

    <div id="punto-origen"></div>
    <div class="etiqueta-flotante" id="etq-1">Anatomía de un<br>suelo fracturado</div>
    <div class="etiqueta-flotante" id="etq-2">Home</div>
    <div class="etiqueta-flotante" id="etq-4">Mapa interactivo //<br>Santa Martha Acatitla</div>
    <div class="etiqueta-flotante" id="etq-5">Frottages //<br>Archivo análogo</div>
</div>

<script>
    let yaExploto = false;

    const destinos = [
        { id: 'c1', x: 62, y: 25, etq: 'etq-1', href: 'investigacion.html', labelRight: true  },
        { id: 'c2', x: 35, y: 35, etq: 'etq-2', href: 'index.html',         labelRight: false },
        { id: 'c3', x: 50, y: 50, etq: null,    href: null,                  labelRight: false },
        { id: 'c4', x: 38, y: 70, etq: 'etq-4', href: 'mapa.html',          labelRight: false },
        { id: 'c5', x: 65, y: 65, etq: 'etq-5', href: 'frottages.html',     labelRight: true  },
    ];

    function explotar() {
        if (yaExploto) return;
        yaExploto = true;

        const textoGroup  = document.getElementById('logo-texto-group');
        const instruccion = document.getElementById('instruccion');
        const logoWrapper = document.getElementById('logo-wrapper');
        const origenDot   = document.getElementById('punto-origen');
        const svg         = document.getElementById('logo-svg');

        instruccion.style.opacity = '0';
        setTimeout(() => { textoGroup.style.opacity = '0'; }, 80);

        setTimeout(() => {
            logoWrapper.style.pointerEvents = 'none';

            const svgRect = svg.getBoundingClientRect();
            const scaleX  = svgRect.width  / 1920;
            const scaleY  = svgRect.height / 1080;
            const vw = window.innerWidth;
            const vh = window.innerHeight;

            // Punto de origen (centro visual de los 5 puntos)
            const cx = svgRect.left + 855 * scaleX;
            const cy = svgRect.top  + 512 * scaleY;
            origenDot.style.left = cx + 'px';
            origenDot.style.top  = cy + 'px';
            origenDot.style.transition = 'opacity 0.4s ease';
            origenDot.style.opacity = '1';

            destinos.forEach((d, i) => {
                const circulo = document.getElementById(d.id);
                const startX  = svgRect.left + parseFloat(circulo.getAttribute('cx')) * scaleX;
                const startY  = svgRect.top  + parseFloat(circulo.getAttribute('cy')) * scaleY;

                // Crear punto flotante
                const punto = document.createElement('div');
                punto.className = 'punto-flotante';
                punto.style.left    = startX + 'px';
                punto.style.top     = startY + 'px';
                punto.style.opacity = '1';
                if (d.href) punto.onclick = () => window.location.href = d.href;
                document.getElementById('inicio').appendChild(punto);

                circulo.style.opacity = '0';

                const xFinal = (d.x / 100) * vw;
                const yFinal = (d.y / 100) * vh;

                setTimeout(() => {
                    punto.style.transition = `left 1s cubic-bezier(0.22,1,0.36,1) ${i*80}ms, top 1s cubic-bezier(0.22,1,0.36,1) ${i*80}ms`;
                    punto.style.left = xFinal + 'px';
                    punto.style.top  = yFinal + 'px';

                    if (d.etq) {
                        setTimeout(() => {
                            const etq = document.getElementById(d.etq);
                            if (!etq) return;
                            if (d.labelRight) {
                                etq.style.left  = (xFinal + 20) + 'px';
                                etq.style.right = 'auto';
                            } else {
                                etq.style.right = (vw - xFinal + 20) + 'px';
                                etq.style.left  = 'auto';
                            }
                            etq.style.top        = (yFinal - 8) + 'px';
                            etq.style.transition = 'opacity 0.5s ease';
                            etq.style.opacity    = '1';
                            if (d.href) {
                                etq.classList.add('activa');
                                etq.onclick = () => window.location.href = d.href;
                            }
                        }, 900 + i * 80);
                    }
                }, 50);
            });
        }, 550);
    }
</script>
