            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #231f20;
            text-decoration: none;
        }
        nav a:hover { text-decoration: underline; }

        .galeria {
            padding: 40px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 32px 24px;
        }

        .item { cursor: pointer; }

        .item-img {
            width: 100%;
            aspect-ratio: 3 / 4;
            object-fit: cover;
            background: #fff;
            display: block;
            transition: opacity 0.2s ease;
        }

        .item:hover .item-img { opacity: 0.85; }

        .item-num {
            font-family: 'ApercuMono', monospace;
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 0.1em;
            margin-top: 8px;
            color: #231f20;
        }

        #lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(255, 229, 0, 0.96);
            z-index: 200;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        #lightbox.activo { display: flex; }

        #lightbox-img {
            max-height: 82vh;
            max-width: 70vw;
            object-fit: contain;
            display: block;
        }

        #lightbox-num {
            font-family: 'ApercuMono', monospace;
            font-size: 12px;
            letter-spacing: 0.2em;
            margin-top: 16px;
            color: #231f20;
        }

        #lightbox-cerrar {
            position: fixed;
            top: 28px;
            right: 40px;
            font-family: 'ApercuMono', monospace;
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            background: none;
            border: none;
            cursor: pointer;
            color: #231f20;
        }

        #lightbox-prev, #lightbox-next {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            font-family: 'ApercuMono', monospace;
            font-size: 20px;
            background: none;
            border: none;
            cursor: pointer;
            color: #231f20;
            padding: 20px;
        }

        #lightbox-prev { left: 20px; }
        #lightbox-next { right: 20px; }

        footer {
    background: #fff;
    padding: 48px 40px;
    display: flex;
    justify-content: center;
    gap: 50px;
    margin-top: 40px;
}

.btn-footer {

    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #231f20;
    text-decoration: none;
    border: 1.5px solid #231f20;
    padding: 14px 32px;
    transition: background 0.2s ease, color 0.2s ease;
}

.btn-footer:hover {
    background: #231f20;
    color: #fff200;
}
    </style>

<script>
    const imagenes = [
        { src: 'img/JPEG/Frotaje-01.jpg', num: '01.' },
        { src: 'img/JPEG/Frotaje-02.jpg', num: '02.' },
        { src: 'img/JPEG/Frotaje-03.jpg', num: '03.' },
        { src: 'img/JPEG/Frotaje-04.jpg', num: '04.' },
        { src: 'img/JPEG/Frotaje-05.jpg', num: '05.' },
        { src: 'img/JPEG/Frotaje-6.jpg',  num: '06.' },
        { src: 'img/JPEG/Frotaje-7.jpg',  num: '07.' },
        { src: 'img/JPEG/Frotaje-08.jpg', num: '08.' },
        { src: 'img/JPEG/Frotaje-09.jpg', num: '09.' },
        { src: 'img/JPEG/Frotaje-10.jpg', num: '10.' },
        { src: 'img/JPEG/Frotaje-11.jpg', num: '11.' },
        { src: 'img/JPEG/Frotaje-12.jpg', num: '12.' },
        { src: 'img/JPEG/Frotaje-13.jpg', num: '13.' },
        { src: 'img/JPEG/Frotaje-14.jpg', num: '14.' },
        { src: 'img/JPEG/Frotaje-15.jpg', num: '15.' },
        { src: 'img/JPEG/Frotaje-16.jpg', num: '16.' },
        { src: 'img/JPEG/Frotaje-17.jpg', num: '17.' },
        { src: 'img/JPEG/Frotaje-18.jpg', num: '18.' },
        { src: 'img/JPEG/frotaje-19.jpg', num: '19.' },
        { src: 'img/JPEG/frotaje-20.jpg', num: '20.' },
    ];

    let actual = 0;

    function abrirLightbox(i) {
        actual = i;
        document.getElementById('lightbox-img').src = imagenes[i].src;
        document.getElementById('lightbox-num').textContent = imagenes[i].num;
        document.getElementById('lightbox').classList.add('activo');
        document.body.style.overflow = 'hidden';
    }

    function cerrarLightbox() {
        document.getElementById('lightbox').classList.remove('activo');
        document.body.style.overflow = '';
    }

    function navegar(dir) {
        actual = (actual + dir + imagenes.length) % imagenes.length;
        document.getElementById('lightbox-img').src = imagenes[actual].src;
        document.getElementById('lightbox-num').textContent = imagenes[actual].num;
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') cerrarLightbox();
        if (e.key === 'ArrowRight') navegar(1);
        if (e.key === 'ArrowLeft') navegar(-1);
    });

    document.getElementById('lightbox').addEventListener('click', (e) => {
        if (e.target === document.getElementById('lightbox')) cerrarLightbox();
    });
</script>
